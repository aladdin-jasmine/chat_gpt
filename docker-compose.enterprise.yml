version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-platform-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/aiplatform
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis
      - prometheus
      - loki
    networks:
      - ai-platform

  frontend:
    image: node:20
    container_name: ai-platform-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c 'npm install && npm run dev'
    ports:
      - '3000:3000'
    networks:
      - ai-platform

  postgres:
    image: postgres:16
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiplatform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-platform

  redis:
    image: redis:7
    container_name: ai-platform-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - ai-platform

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-platform-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    networks:
      - ai-platform

  grafana:
    image: grafana/grafana:latest
    container_name: ai-platform-grafana
    ports:
      - '3001:3000'
    volumes:
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    depends_on:
      - prometheus
    networks:
      - ai-platform

  loki:
    image: grafana/loki:latest
    container_name: ai-platform-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    networks:
      - ai-platform

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.events.event_bus.celery_app worker --loglevel=info
    depends_on:
      - redis
      - backend
    networks:
      - ai-platform

networks:
  ai-platform:
    driver: bridge

volumes:
  postgres_data:
