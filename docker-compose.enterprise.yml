version: '3.9'
services:
  backend:
    build: .
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: npm run dev
    ports:
      - '3000:3000'

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiplatform

  redis:
    image: redis:7
